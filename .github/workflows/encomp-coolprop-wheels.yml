name: encomp-coolprop wheels

# Builds the native encomp-coolprop wheels (the compiled Polars plugin + bundled
# libCoolProp) for macOS / Linux / Windows. Produces PyPI-compatible wheels as
# build artifacts. Does NOT upload to PyPI (publish is a separate, manual step).
on:
  workflow_dispatch:
  pull_request:
    paths: ["encomp-coolprop/**", ".github/workflows/encomp-coolprop-wheels.yml"]

jobs:
  wheels:
    name: wheels-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # manylinux x86_64
          - ubuntu-24.04-arm   # manylinux aarch64
          - macos-13           # macOS x86_64
          - macos-14           # macOS arm64
          - windows-latest     # Windows x86_64
    steps:
      - uses: actions/checkout@v4

      # macOS / Windows runners ship Rust; the manylinux container does not (the
      # cibuildwheel linux before-all installs it). cmake is installed by before-all.
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: encomp-coolprop
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # collect everything into a single artifact for convenience (still no PyPI upload)
  collect:
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: actions/upload-artifact@v4
        with:
          name: encomp-coolprop-wheels
          path: dist/*.whl
