name: encomp-coolprop release

# Build the native encomp-coolprop wheels (compiled plugin + bundled libCoolProp)
# for macOS / Linux / Windows, run the FULL encomp test suite against each wheel on
# Python 3.13 and 3.14, and publish to PyPI on a version tag.
#
#   build-wheels  -> one wheel per OS/arch (abi3 cp313 => runs on 3.13+)
#   test          -> install each wheel + encomp + run pytest, every OS x py
#   publish       -> only on a `encomp-coolprop-v*` tag, after all tests pass,
#                    via PyPI Trusted Publishing (OIDC -- no token stored anywhere)
on:
  workflow_dispatch:
  pull_request:
    paths: ["encomp-coolprop/**", ".github/workflows/encomp-coolprop-release.yml"]
  push:
    tags: ["encomp-coolprop-v*"]

jobs:
  build-wheels:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # manylinux x86_64
          - ubuntu-24.04-arm   # manylinux aarch64
          - macos-13           # macOS x86_64
          - macos-14           # macOS arm64
          - windows-latest     # Windows x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: encomp-coolprop
          output-dir: wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-13, macos-14, windows-latest]
        python: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          path: wheelhouse
          pattern: wheels-*
          merge-multiple: true
      - name: Install + run the full encomp suite
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # encomp + its deps (incl. the hard dep encomp-coolprop, resolved from the
          # just-built wheelhouse; abi3 -> the cp313 wheel installs on 3.14 too) + test deps
          pip install --find-links wheelhouse . pytest hypothesis pytest-asyncio
          python -c "import encomp_coolprop as cp; assert cp.self_check(), 'plugin self_check failed'"
          python -m pytest encomp/tests/ -q

  publish:
    name: publish to PyPI
    needs: [build-wheels, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/encomp-coolprop-v')
    runs-on: ubuntu-latest
    environment: pypi               # configure the Trusted Publisher against this env
    permissions:
      id-token: write               # OIDC -> PyPI; no API token/secret is used
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
