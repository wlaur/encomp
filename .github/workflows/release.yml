name: encomp CI/release

# Build the encomp wheels (pure-Python modules + the compiled CoolProp Polars plugin
# + bundled libCoolProp, all in one wheel) for macOS / Linux / Windows, run the full
# test suite against each wheel on Python 3.13 and 3.14, and publish to PyPI on a tag.
#
#   typecheck      -> ruff, pyright (strict) + pyrefly, docs build, plus
#                     source-only doc/static tests (ty is local-only and intentionally not gated)
#   rust           -> cargo fmt, clippy, and in-crate tests
#   build-wheels   -> one wheel per OS/arch (abi3 cp313 => runs on 3.13+)
#   test           -> install each prebuilt wheel + run pytest, every OS x py
#   publish        -> only on a `v*` tag, after all tests pass, via PyPI Trusted
#                     Publishing (OIDC -- no token/secret stored anywhere)
#   github-release -> after a successful publish, create the GitHub Release for
#                     the tag with auto-generated notes
on:
  workflow_dispatch:
  # no paths filter: the checks below are REQUIRED by branch protection, and a required
  # check that is skipped (paths not matched) would block the PR forever -- so every PR
  # runs them. The concurrency group cancels superseded runs.
  pull_request:
  push:
    tags: ["v*"]

# One in-flight run per ref: pushing a new commit to a PR branch cancels that branch's
# previous run (frees runners, no stale queue). cancel-in-progress is limited to PRs, so a
# `v*` tag publish -- which has its own unique ref anyway -- is never cancelled mid-run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    # Static source checks run before building the project. The executable docs
    # checks then install the compiled plugin too, so README/usage snippets and
    # notebooks exercise the same public API users get from wheels.
    name: typecheck (pyright + pyrefly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --locked --no-install-project
      - run: uv run --no-sync ruff check encomp scripts
      - run: uv run --no-sync pyright
      - run: uv run --no-sync pyrefly check
      - name: Build and install the compiled CoolProp plugin for docs execution
        run: |
          python -m pip install cmake
          uv run --no-sync python scripts/build_libcoolprop.py
          uv run --no-sync maturin develop --release
      - run: uv run --no-sync pytest encomp/tests/test_docs.py encomp/tests/test_static_typing.py -q
      - run: uv run --no-sync sphinx-build -W -b html docs docs/_build/html

  rust:
    name: rust fmt/clippy/test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Rust components and CoolProp build dependency
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
          python -m pip install cmake
      - name: Build bundled CoolProp library
        run: python scripts/build_libcoolprop.py
      - run: cargo fmt --manifest-path rust/Cargo.toml -- --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - run: PYO3_PYTHON="$(which python)" cargo test --manifest-path rust/Cargo.toml --no-default-features

  build-wheels:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # manylinux x86_64
          - ubuntu-24.04-arm   # manylinux aarch64
          - macos-14           # macOS arm64 (Apple Silicon; Intel x86_64 intentionally unsupported)
          - windows-latest     # Windows x86_64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build wheels
        uses: pypa/cibuildwheel@a0a973acdc9e7b7f8b04ac5c80e6883a5a102615 # v4.1.0
        with:
          package-dir: .
          output-dir: wheelhouse
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
        python: ["3.13", "3.14"]
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: wheelhouse
          name: wheels-${{ matrix.os }}
      - name: Install the prebuilt wheel + run the full suite
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # install the PREBUILT encomp wheel (abi3 cp313 installs on 3.14 too) by
          # name so it is not rebuilt from source; deps + test deps come from PyPI
          version=$(python -c 'from pathlib import Path; wheels = sorted(Path("wheelhouse").glob("encomp-*.whl")); assert len(wheels) == 1, f"expected exactly one encomp wheel, found {len(wheels)}"; print(wheels[0].name.split("-")[1])')
          pip install --find-links wheelhouse "encomp==$version" pytest hypothesis
          python -c "from encomp import coolprop as cp; assert cp.self_check(), 'plugin self_check failed'"
          python -m pytest --pyargs encomp.tests -q

  publish:
    name: publish to PyPI
    needs: [typecheck, rust, build-wheels, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi               # configure the Trusted Publisher against this env
    permissions:
      id-token: write               # OIDC -> PyPI; no API token/secret is used
      contents: read                # checkout below reads pyproject.toml to guard the tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify the tag matches the pyproject version
        # the wheels carry the version from pyproject.toml; refuse to publish under a tag
        # that disagrees (e.g. tagging v1.5.1 while pyproject still says 1.5.0)
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $version (expected v$version)"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches pyproject version $version"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    # only after PyPI succeeded, so the Release never announces a version that
    # failed to publish (skipped automatically on PR runs, like publish itself)
    name: create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write               # create the release; kept out of the publish job
    steps:
      - name: Create the GitHub Release with auto-generated notes
        # notes are generated against the previous release, same format as the
        # manually created releases up to v1.5.4
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
