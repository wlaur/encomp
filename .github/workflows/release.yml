name: encomp CI/release

# Build the encomp wheels (pure-Python modules + the compiled CoolProp Polars plugin
# + bundled libCoolProp, all in one wheel) for macOS / Linux / Windows, run the full
# test suite against each wheel on Python 3.13 and 3.14, and publish to PyPI on a tag.
#
#   typecheck      -> ruff check + format, pyright (strict) + pyrefly + ty, docs build,
#                     plus source-only doc/static tests
#   docs-rtd       -> rebuild the docs in a ReadTheDocs-equivalent environment (no project
#                     install, no compiled plugin) so an RTD-only break fails the PR
#   oracle-parity  -> install Python CoolProp only as a test oracle and compare it with
#                     the bundled implementation
#   free-threaded-smoke -> visible, non-publishing Python 3.14t readiness probe; allowed
#                     to fail until the released dependency stack supports it completely
#   dependency-floors -> install at the LOWEST versions the declared bounds allow and run the
#                     suite, so a too-low bound fails here rather than on a user's machine
#   rust           -> cargo fmt, clippy, and in-crate tests
#   build-wheels   -> one wheel per OS/arch (abi3 cp313 => runs on 3.13+)
#   test           -> install each prebuilt wheel + run pytest, every OS x py
#   publish        -> only on a `v*` tag, after all tests pass, via PyPI Trusted
#                     Publishing (OIDC -- no token/secret stored anywhere)
#   github-release -> after a successful publish, create the GitHub Release for
#                     the tag with auto-generated notes
on:
  workflow_dispatch:
  # no paths filter: the checks below are REQUIRED by branch protection, and a required
  # check that is skipped (paths not matched) would block the PR forever -- so every PR
  # runs them. The concurrency group cancels superseded runs.
  pull_request:
  push:
    tags: ["v*"]

# One in-flight run per ref: pushing a new commit to a PR branch cancels that branch's
# previous run (frees runners, no stale queue). cancel-in-progress is limited to PRs, so a
# `v*` tag publish -- which has its own unique ref anyway -- is never cancelled mid-run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    # Static source checks run before building the project. The executable docs
    # checks then install the compiled plugin too, so README/usage snippets and
    # notebooks exercise the same public API users get from wheels.
    # the job name is pinned by branch protection (required status checks match on the
    # exact name), so it stays as-is even though the job now gates on ty as well;
    # renaming it requires updating the required checks on main in the same change
    name: typecheck (pyright + pyrefly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --locked --no-install-project
      - run: uv run --no-sync ruff check encomp scripts
      # formatting is enforced here too, not only by the (opt-in) pre-commit hook
      - run: uv run --no-sync ruff format --check encomp scripts
      - run: uv run --no-sync pyright
      - run: uv run --no-sync pyrefly check
      # ty's warnings fail the gate too: error-on-warning is set in [tool.ty.terminal]
      - run: uv run --no-sync ty check
      - name: Build and install the compiled CoolProp plugin for docs execution
        run: |
          python -m pip install cmake
          uv run --no-sync python scripts/build_libcoolprop.py
          uv run --no-sync maturin develop --release
      - run: uv run --no-sync pytest encomp/tests/test_docs.py encomp/tests/test_static_typing.py -q
      - name: Install notebook rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - run: uv run --no-sync sphinx-build -W -b html docs docs/_build/html

  docs-rtd:
    # Reproduce the ReadTheDocs build so an RTD-only breakage fails the PR instead of
    # silently landing (finding: v1.6.2 docs never published because RTD builds broke at
    # merge and nothing gated them). RTD runs `uv sync --no-install-project`, so the
    # project and its compiled plugin are NOT installed: autodoc imports encomp from
    # source (conf.py adds the repo root to sys.path) and the notebooks render their
    # committed outputs (conf.py sets nbsphinx_execute="never" when READTHEDOCS is set)
    # rather than executing against a plugin that isn't there. The `typecheck` job above
    # is the complement -- it installs the plugin and executes the notebooks, gating their
    # correctness. Keep this job's steps in sync with .readthedocs.yaml.
    name: docs (ReadTheDocs parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
      - name: Install pandoc (nbsphinx needs it to render notebooks; present on RTD images)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
      - name: Sync docs tooling WITHOUT installing the project (mirrors .readthedocs.yaml)
        run: uv sync --locked --all-extras --all-groups --no-install-project
      - name: Build the docs exactly as ReadTheDocs does (fail on warning)
        env:
          READTHEDOCS: "True"
        run: uv run --no-sync python -m sphinx -T -W --keep-going -b html docs docs/_build/html

  oracle-parity:
    name: bundled CoolProp parity oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
      - name: Install development tools and the test-only Python CoolProp oracle
        run: uv sync --locked --no-install-project --group oracle
      - name: Build the one bundled CoolProp implementation and native artifact
        run: |
          python -m pip install cmake
          uv run --no-sync python scripts/build_libcoolprop.py
          uv run --no-sync maturin develop --release
      - name: Compare native scalar/plugin results with Python CoolProp 8.0.0
        run: uv run --no-sync pytest encomp/tests/test_coolprop_plugin.py encomp/tests/test_rust_parity.py -q

  dependency-floors:
    # The `test` job below installs the wheel's dependencies from PyPI at their LATEST
    # versions, so it can never notice that a declared lower bound is too low. Resolve the
    # bounds themselves and run the suite against that resolution: an API that only exists
    # in a newer release than the bound claims fails here instead of on a user's machine.
    #
    # --only-binary=:all: keeps the resolution to versions that actually install on this
    # Python: a bound may legitimately name a release that predates 3.13 and ships no wheel
    # for it (pydantic 2.4 is the floor for the core-schema API, but its pydantic-core has
    # no cp313 wheel). Resolving to a version nobody can install would test nothing.
    #
    # The matrix covers the OLDEST and NEWEST supported Python: a pure-Python wheel
    # installs on any Python, so --only-binary cannot stop a floor that resolves on
    # every supported Python but only works on some of them (e.g. one that uses a
    # stdlib API the newest Python removed).
    name: dependency floors (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build the bundled CoolProp library
        run: |
          python -m pip install cmake
          uv sync --locked --no-install-project
          uv run --no-sync python scripts/build_libcoolprop.py
      - name: Install encomp into a fresh env pinned to the lowest allowed versions
        # a fresh env, not the dev one: the dev group's own requirements would otherwise
        # constrain the resolution back up. --no-deps on the project keeps the pins in place,
        # and building it through PEP 517 (rather than `maturin build`) is what cibuildwheel
        # does, so the bundled libCoolProp lands beside the plugin exactly as it does in a
        # released wheel.
        #
        # The env lives OUTSIDE the workspace on purpose. Tests that look for the repo (
        # test_docs, test_static_typing) walk up from their own __file__ until they find a
        # pyproject.toml; from a venv nested in the workspace they would find this checkout
        # and then run doc snippets against the source tree, which has no compiled plugin.
        # Outside it, they skip -- exactly as they do for someone who pip-installed a wheel.
        run: |
          uv pip compile pyproject.toml --python-version ${{ matrix.python-version }} --resolution lowest-direct --only-binary=:all: -o floors.txt
          cat floors.txt
          uv venv "$RUNNER_TEMP/floors-venv" --python ${{ matrix.python-version }}
          PY=$RUNNER_TEMP/floors-venv/bin/python
          uv pip install --python "$PY" -r floors.txt
          uv pip install --python "$PY" --no-deps .
          uv pip install --python "$PY" pytest hypothesis
      - name: Report the resolved versions and run the suite against them
        # NOT from the workspace: `encomp/` sits in it and would shadow the installed package
        # on sys.path, resolving the import to a source tree with no compiled plugin.
        working-directory: ${{ runner.temp }}
        run: |
          PY=$RUNNER_TEMP/floors-venv/bin/python
          "$PY" - <<'PY'
          import importlib.metadata as metadata
          from pathlib import Path

          names = ("encomp", "pint", "pydantic", "typeguard", "typing_extensions", "numpy", "polars", "sympy", "uncertainties")
          for name in names:
              print(f"{name:20s} {metadata.version(name)}")

          import importlib.util
          import encomp.coolprop as cp

          assert importlib.util.find_spec("CoolProp") is None, "Python CoolProp must not be installed"
          assert not any(r.lower().startswith("coolprop") for r in (metadata.requires("encomp") or []))

          package = Path(cp.__file__).parent
          print(f"\nencomp.coolprop imported from {package}")
          for path in sorted(package.iterdir()):
              print(f"  {path.name}")

          print("\nlib_path:", cp.lib_path())
          print("lib_version:", cp.lib_version())
          assert cp.self_check(), "plugin self_check failed"
          print("self_check OK")
          PY
          "$PY" -m pytest --pyargs encomp.tests -q

  rust:
    name: rust fmt/clippy/test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Rust components and CoolProp build dependency
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
          python -m pip install cmake
      - name: Build bundled CoolProp library
        run: python scripts/build_libcoolprop.py
      - run: cargo fmt --manifest-path rust/Cargo.toml -- --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - run: PYO3_PYTHON="$(which python)" cargo test --manifest-path rust/Cargo.toml --no-default-features

  free-threaded-smoke:
    name: Python 3.14t smoke (experimental)
    runs-on: ubuntu-latest
    # This preparatory signal must not block normal-GIL releases. Python 3.15t wheels
    # remain gated on a released Polars/PyO3 stack and full free-threaded verification.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14t"
      - name: Install and build without the Python CoolProp package
        run: |
          python -m pip install cmake
          uv sync --locked --no-install-project
          uv run --no-sync python scripts/build_libcoolprop.py
          uv run --no-sync maturin develop --release
      - name: Keep the GIL disabled while importing and exercising both native interfaces
        env:
          PYTHON_GIL: "0"
        run: |
          uv run --no-sync python -W error - <<'PY'
          import importlib.util
          import sys

          import polars as pl

          from encomp import coolprop as cp
          from encomp.fluids import Water
          from encomp.units import Quantity as Q

          assert not sys._is_gil_enabled()
          assert importlib.util.find_spec("CoolProp") is None
          assert Water(P=Q(5e6, "Pa"), T=Q(400.0, "K")).D.m > 900.0
          assert pl.DataFrame({"P": [5e6], "T": [400.0]}).select(cp.water("DMASS", "P", "T"))[0, 0] > 900.0
          assert not sys._is_gil_enabled()
          PY

  build-wheels:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # manylinux x86_64
          - ubuntu-24.04-arm   # manylinux aarch64
          - macos-14           # macOS arm64 (Apple Silicon; Intel x86_64 intentionally unsupported)
          - windows-latest     # Windows x86_64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build wheels
        uses: pypa/cibuildwheel@a0a973acdc9e7b7f8b04ac5c80e6883a5a102615 # v4.1.0
        with:
          package-dir: .
          output-dir: wheelhouse
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    needs: build-wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, windows-latest]
        python: ["3.13", "3.14"]
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: wheelhouse
          name: wheels-${{ matrix.os }}
      - name: Install the prebuilt wheel + run the full suite
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install the downloaded artifact by its exact path. PR builds deliberately
          # retain the current released version, so asking pip for `encomp==$version`
          # can select that same-version wheel from PyPI instead of this candidate.
          wheel=$(python -c 'from pathlib import Path; wheels = sorted(Path("wheelhouse").glob("encomp-*.whl")); assert len(wheels) == 1, f"expected exactly one encomp wheel, found {len(wheels)}"; print(wheels[0])')
          pip install "$wheel" pytest hypothesis
          python - <<'PY'
          import importlib.metadata as metadata
          import importlib.util

          from encomp import coolprop as cp

          assert cp.self_check(), "plugin self_check failed"
          assert importlib.util.find_spec("CoolProp") is None, "Python CoolProp was unexpectedly installed"
          assert not any(r.lower().startswith("coolprop") for r in (metadata.requires("encomp") or []))
          PY
          python -m pytest --pyargs encomp.tests -q

  publish:
    name: publish to PyPI
    needs: [typecheck, docs-rtd, oracle-parity, dependency-floors, rust, build-wheels, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi               # configure the Trusted Publisher against this env
    permissions:
      id-token: write               # OIDC -> PyPI; no API token/secret is used
      contents: read                # checkout below reads pyproject.toml to guard the tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify the tag matches the pyproject version
        # the wheels carry the version from pyproject.toml; refuse to publish under a tag
        # that disagrees (e.g. tagging v1.5.1 while pyproject still says 1.5.0)
        run: |
          version=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match pyproject version $version (expected v$version)"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches pyproject version $version"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    # only after PyPI succeeded, so the Release never announces a version that
    # failed to publish (skipped automatically on PR runs, like publish itself)
    name: create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write               # create the release; kept out of the publish job
    steps:
      - name: Create the GitHub Release with auto-generated notes
        # notes are generated against the previous release, same format as the
        # manually created releases up to v1.5.4
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
