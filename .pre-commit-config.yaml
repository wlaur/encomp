repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff-check
        types_or: [ python, pyi, jupyter ]
      - id: ruff-format
        types_or: [python, pyi, jupyter]
  # Rust lint/format for the encomp-coolprop plugin crate. `language: system` uses
  # the developer's installed toolchain (rustfmt + clippy ship with stable Rust).
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (encomp-coolprop)
        entry: cargo fmt --manifest-path encomp-coolprop/Cargo.toml -- --check
        language: system
        files: ^encomp-coolprop/.*\.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy -D warnings (encomp-coolprop)
        entry: cargo clippy --manifest-path encomp-coolprop/Cargo.toml --all-targets -- -D warnings
        language: system
        files: ^encomp-coolprop/.*\.rs$
        pass_filenames: false
